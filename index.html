<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaipadamughal eFootball League – Season 2</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07090a;--s1:#0d1117;--s2:#111820;--s3:#0a1520;
  --border:#1e2d3a;--border2:#243545;
  --cyan:#00d4ff;--green:#00ff88;--gold:#ffcc00;--red:#ff4444;--purple:#a855f7;
  --text:#ddeeff;--muted:#4a6a80;--dim:#1a2a38;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,212,255,.06),transparent),
             radial-gradient(ellipse 60% 60% at 100% 80%,rgba(0,255,136,.03),transparent);}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1.5rem;background:rgba(7,9,10,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(18px);}
.logo{display:flex;align-items:center;gap:.6rem;}
.logo img{height:36px;width:auto;border-radius:4px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;color:var(--cyan);line-height:1;}
.logo-sub{font-size:.55rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.nav-tabs{display:flex;background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:3px;gap:2px;}
.ntab{background:none;border:none;color:var(--muted);padding:.38rem .85rem;border-radius:4px;
  font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.8px;
  cursor:pointer;transition:all .2s;text-transform:uppercase;}
.ntab.active{background:var(--s2);color:var(--cyan);border:1px solid var(--border);}
.ntab:hover:not(.active){color:var(--text);}

/* ── HERO ── */
.hero{position:relative;z-index:1;padding:3rem 1.5rem 2.5rem;text-align:center;
  border-bottom:1px solid var(--border);
  background:url('EFOOTBALL.jpeg') center/cover no-repeat;}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,9,10,.8),rgba(7,9,10,.6),rgba(7,9,10,.9));z-index:0;}
.hero>*{position:relative;z-index:1;}
.hero-eyebrow{font-size:.65rem;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:.75rem;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,8vw,6rem);line-height:.9;letter-spacing:2px;color:#fff;margin-bottom:.4rem;}
.hero h1 .hl{background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-season{font-size:.8rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:1.5rem;}
.hero-stats{display:flex;justify-content:center;gap:2.5rem;flex-wrap:wrap;}
.hs{text-align:center;}
.hs-val{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--cyan);}
.hs-key{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}

/* ── PAGES ── */
.page{display:none;position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:1.75rem 1.25rem;}
.page.on{display:block;}

/* ── SECTION HEADING ── */
.sh{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--text);
  margin-bottom:1.1rem;display:flex;align-items:center;gap:.6rem;}
.sh::after{content:'';flex:1;height:1px;background:var(--border);}
.sh.gold{color:var(--gold);}
.sh.cyan{color:var(--cyan);}
.sh.green{color:var(--green);}

/* ── GROUP STANDINGS ── */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem;margin-bottom:2rem;}
.group-card{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.group-card-header{padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(0,255,136,.04));border-bottom:1px solid var(--border);}
.group-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--cyan);}
.group-tag{font-size:.6rem;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
.standings-table{width:100%;border-collapse:collapse;font-size:.8rem;}
.standings-table th{padding:.45rem .6rem;text-align:center;font-size:.6rem;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);}
.standings-table th:first-child{text-align:left;padding-left:.85rem;}
.standings-table td{padding:.5rem .6rem;text-align:center;border-bottom:1px solid rgba(30,45,58,.5);}
.standings-table tr:last-child td{border-bottom:none;}
.standings-table td:first-child{text-align:left;padding-left:.85rem;}
.standings-table tr:hover td{background:rgba(255,255,255,.02);}
.team-cell{display:flex;align-items:center;gap:.45rem;}
.team-flag{font-size:.9rem;}
.team-name-sm{font-weight:600;font-size:.8rem;}
.team-player{font-size:.65rem;color:var(--muted);}
.pts-cell{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--cyan);}
.rank-badge{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;
  justify-content:center;font-size:.6rem;font-weight:700;margin-right:.3rem;flex-shrink:0;}
.rank-badge.q{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3);}
.rank-badge.e{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.2);}
.rank-badge.n{background:var(--dim);color:var(--muted);border:1px solid var(--border);}
.gd-pos{color:var(--green);font-size:.78rem;}
.gd-neg{color:var(--red);font-size:.78rem;}
.gd-neu{color:var(--muted);font-size:.78rem;}
.qual-line{border-top:2px dashed rgba(0,255,136,.25) !important;}

/* ── MATCHDAY TABS ── */
.md-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.md-tab{background:var(--s1);border:1px solid var(--border);border-radius:4px;
  padding:.35rem .75rem;font-size:.72rem;font-weight:700;letter-spacing:.5px;
  color:var(--muted);cursor:pointer;transition:all .2s;text-transform:uppercase;}
.md-tab.active{background:rgba(0,212,255,.1);border-color:var(--cyan);color:var(--cyan);}
.md-tab:hover:not(.active){color:var(--text);border-color:var(--border2);}

.md-content{display:none;}
.md-content.on{display:block;}

/* ── MATCH CARDS ── */
.matches-section{margin-bottom:1.25rem;}
.ms-label{font-size:.62rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);
  margin-bottom:.5rem;padding:.3rem 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.4rem;}
.ms-label .dot{width:6px;height:6px;border-radius:50%;}
.ms-label .dot.a{background:rgba(0,212,255,.6);}
.ms-label .dot.b{background:rgba(0,255,136,.6);}
.ms-label .dot.c{background:rgba(255,204,0,.6);}
.ms-label .dot.d{background:rgba(168,85,247,.6);}

.mcard{background:var(--s1);border:1px solid var(--border);border-radius:6px;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  padding:.75rem 1rem;gap:.75rem;margin-bottom:.45rem;transition:border-color .2s;}
.mcard:hover{border-color:var(--border2);}
.mcard.live{border-color:rgba(255,68,68,.5);}
.mcard.complete{opacity:.85;}
.mc-team{display:flex;flex-direction:column;gap:.15rem;}
.mc-team.right{text-align:right;align-items:flex-end;}
.mc-flag{font-size:1.1rem;}
.mc-name{font-weight:600;font-size:.85rem;}
.mc-player{font-size:.65rem;color:var(--muted);}
.mc-name.winner{color:var(--green);}
.mc-name.loser{color:var(--muted);}
.mc-center{text-align:center;flex-shrink:0;}
.mc-score{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;line-height:1;letter-spacing:2px;}
.mc-score .s{color:var(--cyan);}
.mc-score .sep{color:var(--border2);font-size:1.2rem;padding:0 2px;}
.mc-score.winner-left .s:first-child{color:var(--green);}
.mc-score.winner-right .s:last-child{color:var(--green);}
.mc-vs{font-size:.7rem;letter-spacing:1px;color:var(--muted);font-weight:600;}
.mc-status{font-size:.6rem;letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-top:2px;}
.mc-status.upcoming{color:var(--muted);}
.mc-status.live{color:var(--red);}
.mc-status.complete{color:var(--green);}
.mc-status.postponed{color:var(--gold);}

/* ── KNOCKOUT BRACKET ── */
.ko-scroll{overflow-x:auto;padding-bottom:1rem;}
.ko-bracket{display:flex;gap:0;align-items:stretch;min-width:max-content;}
.ko-round{display:flex;flex-direction:column;min-width:210px;}
.ko-round-header{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);
  text-align:center;padding:.55rem;border-bottom:1px solid var(--border);margin-bottom:.3rem;
  position:sticky;top:0;background:var(--bg);}
.ko-round-header.r16{color:var(--cyan);}
.ko-round-header.qf{color:var(--gold);}
.ko-round-header.sf{color:var(--purple);}
.ko-round-header.final{color:var(--green);}
.ko-matches{display:flex;flex-direction:column;justify-content:space-evenly;flex:1;padding:.35rem .45rem;gap:.5rem;}
.ko-match{background:var(--s1);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.ko-match:hover{border-color:var(--border2);}
.ko-status-bar{padding:.28rem .6rem;font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;
  font-weight:700;border-bottom:1px solid var(--border);text-align:right;}
.ko-status-bar.upcoming{color:var(--muted);background:transparent;}
.ko-status-bar.live{color:var(--red);background:rgba(255,68,68,.06);}
.ko-status-bar.complete{color:var(--green);background:rgba(0,255,136,.04);}
.ko-status-bar.postponed{color:var(--gold);background:rgba(255,204,0,.04);}
.ko-team{display:flex;align-items:center;gap:.4rem;padding:.5rem .65rem;font-size:.8rem;
  border-bottom:1px solid var(--border);transition:background .15s;}
.ko-team:last-of-type{border-bottom:none;}
.ko-team.winner{background:rgba(0,255,136,.07);font-weight:700;}
.ko-team.winner .ko-tn{color:var(--green);}
.ko-team.loser{opacity:.38;}
.ko-team .ko-flag{font-size:.85rem;flex-shrink:0;}
.ko-team .ko-tn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.78rem;}
.ko-team .ko-sc{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;color:var(--cyan);min-width:16px;text-align:center;}
.ko-team.winner .ko-sc{color:var(--green);}
.ko-tbd{color:var(--muted);font-style:italic;}
.ko-connector{width:20px;flex-shrink:0;display:flex;align-items:center;}
.ko-connector::after{content:'';width:100%;height:1px;background:var(--border);}

/* ── CHAMPION BANNER ── */
.champ-banner{background:linear-gradient(135deg,#0c1a10,#15200a);border:1px solid var(--gold);
  border-radius:10px;padding:2rem;text-align:center;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.champ-banner::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,204,0,.12),transparent 65%);pointer-events:none;}
.champ-trophy{font-size:3rem;margin-bottom:.5rem;}
.champ-lbl{font-size:.65rem;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem;}
.champ-name{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:#fff;letter-spacing:3px;}

/* ── UTILITY ── */
.btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;
  padding:.5rem 1rem;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:700;
  letter-spacing:.5px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.btn:hover{border-color:var(--cyan);color:var(--cyan);}
.btn.p{background:rgba(0,212,255,.1);border-color:var(--cyan);color:var(--cyan);}
.empty{text-align:center;color:var(--muted);padding:2.5rem;font-size:.85rem;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);
  z-index:999;background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:.5rem 1.2rem;border-radius:20px;font-size:.78rem;font-weight:600;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);
  border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;margin-right:.4rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-row{display:flex;align-items:center;color:var(--muted);font-size:.82rem;padding:2rem;justify-content:center;}

@media(max-width:640px){
  nav{padding:.65rem .9rem;}
  .page{padding:1.25rem .85rem;}
  .hero{padding:2rem .9rem 2rem;}
  .hero-stats{gap:1.5rem;}
  .groups-grid{grid-template-columns:1fr;}
  .mcard{gap:.5rem;padding:.6rem .75rem;}
}
</style>
</head>
<body>

<nav>
  <div class="logo">
    <img src="EFOOTBALL.jpeg" alt="KEL">
    <div>
      <div class="logo-text">Kaipadamughal</div>
      <div class="logo-sub">eFootball League</div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="ntab active" onclick="showPage('home',this)">🏠 HOME</button>
    <button class="ntab" onclick="showPage('matches',this)">⚽ MATCHES</button>
    <button class="ntab" onclick="showPage('knockout',this)">🏆 KNOCKOUT</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-eyebrow">🌍 FIFA WORLD CUP 2026 EDITION 🌍</div>
  <h1>Kaipadamughal<br><span class="hl">eFootball</span> League</h1>
  <div class="hero-season">Season 2 &nbsp;·&nbsp; 32 Players &nbsp;·&nbsp; 4 Groups</div>
  <div class="hero-stats">
    <div class="hs"><div class="hs-val">32</div><div class="hs-key">Players</div></div>
    <div class="hs"><div class="hs-val">4</div><div class="hs-key">Groups</div></div>
    <div class="hs"><div class="hs-val" id="heroPlayed">—</div><div class="hs-key">Played</div></div>
    <div class="hs"><div class="hs-val" id="heroStatus">ACTIVE</div><div class="hs-key">Status</div></div>
  </div>
</div>

<!-- HOME: GROUP STANDINGS -->
<div class="page on" id="home">
  <h2 class="sh gold">🌍 GROUP STANDINGS</h2>
  <div class="groups-grid" id="standingsContainer">
    <div class="loading-row" style="grid-column:1/-1"><span class="spinner"></span>Loading standings…</div>
  </div>
</div>

<!-- MATCHES PAGE -->
<div class="page" id="matches">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;">
    <h2 class="sh" style="margin-bottom:0;">⚽ MATCHDAYS</h2>
    <button class="btn p" onclick="loadAll()">🔄 REFRESH</button>
  </div>
  <div class="md-tabs" id="mdTabs"></div>
  <div id="mdContent"></div>
</div>

<!-- KNOCKOUT PAGE -->
<div class="page" id="knockout">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;">
    <h2 class="sh green" style="margin-bottom:0;">🏆 KNOCKOUT STAGE</h2>
    <button class="btn p" onclick="loadAll()">🔄 REFRESH</button>
  </div>
  <div id="knockoutContainer">
    <div class="loading-row"><span class="spinner"></span>Loading bracket…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG — replace with your Sheet ID
// ══════════════════════════════════════════════════════════════════
const SHEET_ID = '1l16rU-vfJxrMlR__4q7bn_KGPYqQM0uol431cRg36-A';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

// ── STATIC TEAM DATA ──────────────────────────────────────────────
// All teams: [flag, country, player, group]
const TEAMS = {
  // Group A
  'Argentina':     {flag:'🇦🇷', player:'Shefeek',           group:'A'},
  'Belgium':       {flag:'🇧🇪', player:'Rahul',             group:'A'},
  'Japan':         {flag:'🇯🇵', player:'Rifas',             group:'A'},
  'Saudi Arabia':  {flag:'🇸🇦', player:'Sadiq',             group:'A'},
  'Switzerland':   {flag:'🇨🇭', player:'Sahad',             group:'A'},
  'Colombia':      {flag:'🇨🇴', player:'Joel',              group:'A'},
  'Morocco':       {flag:'🇲🇦', player:'Thanveer',          group:'A'},
  'India':         {flag:'🇮🇳', player:'Althaf',            group:'A'},
  // Group B
  'Brazil':        {flag:'🇧🇷', player:'Junaid',            group:'B'},
  'England':       {flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', player:'Ihsan',             group:'B'},
  'Croatia':       {flag:'🇭🇷', player:'Faisal',            group:'B'},
  'USA':           {flag:'🇺🇸', player:'Shaiban',           group:'B'},
  'Denmark':       {flag:'🇩🇰', player:'Aslam KA',          group:'B'},
  'Ghana':         {flag:'🇬🇭', player:'Haroon',            group:'B'},
  'Iran':          {flag:'🇮🇷', player:'Raoof',             group:'B'},
  'Chile':         {flag:'🇨🇱', player:'Shiju',             group:'B'},
  // Group C
  'France':        {flag:'🇫🇷', player:'Fasil',             group:'C'},
  'Portugal':      {flag:'🇵🇹', player:'Chris KC',          group:'C'},
  'Netherlands':   {flag:'🇳🇱', player:'Adnan PH',          group:'C'},
  'Mexico':        {flag:'🇲🇽', player:'Noufal',            group:'C'},
  'South Korea':   {flag:'🇰🇷', player:'Hafis',             group:'C'},
  'Poland':        {flag:'🇵🇱', player:'Ameen',             group:'C'},
  'Egypt':         {flag:'🇪🇬', player:'Al Abas',           group:'C'},
  'Australia':     {flag:'🇦🇺', player:'Aadib',             group:'C'},
  // Group D
  'Germany':       {flag:'🇩🇪', player:'Salman',            group:'D'},
  'Spain':         {flag:'🇪🇸', player:'Shabab',            group:'D'},
  'Italy':         {flag:'🇮🇹', player:'Sharath Chandran',  group:'D'},
  'Uruguay':       {flag:'🇺🇾', player:'Majeed',            group:'D'},
  'Canada':        {flag:'🇨🇦', player:'Ambady',            group:'D'},
  'Serbia':        {flag:'🇷🇸', player:'Abin',              group:'D'},
  'Türkiye':       {flag:'🇹🇷', player:'Adnan',             group:'D'},
  'Senegal':       {flag:'🇸🇳', player:'Shibin Thajudheen', group:'D'},
};

const GROUP_COLORS = {A:'cyan', B:'green', C:'gold', D:'purple'};
const GROUP_DOT    = {A:'a', B:'b', C:'c', D:'d'};

const KO_ORDER  = ['R16','QF','SF','FINAL','FINALS','Final','Finals','Third Place'];
const KO_CLASS  = {R16:'r16',QF:'qf',SF:'sf',FINAL:'final',FINALS:'final',Final:'final',Finals:'final','Third Place':'sf'};
const KO_LABEL  = {R16:'Round of 16',QF:'Quarter Finals',SF:'Semi Finals',FINAL:'Final',FINALS:'Final',Final:'Final',Finals:'Final','Third Place':'3rd Place'};

// ── STATE ──────────────────────────────────────────────────────────
let allMatches   = [];  // parsed from sheet
let groupMatches = {};  // group→matchday→[matches]
let koMatches    = {};  // round→[matches]
let standings    = {};  // group→[{team,w,d,l,gf,ga,pts}]

// ── CSV FETCH & PARSE ─────────────────────────────────────────────
/*
  Expected sheet columns (row 1 = header, skipped):
  A: Phase    → GROUP or KNOCKOUT
  B: Group    → A/B/C/D  or  R16/QF/SF/FINAL
  C: MD       → 1–7  (blank for knockout)
  D: Team1    → country name (must match TEAMS keys)
  E: Score1   → number or blank
  F: Score2   → number or blank
  G: Team2    → country name
  H: Status   → Upcoming / Live / Complete / Postponed
*/
async function fetchData() {
  try {
    const res = await fetch(CSV_URL + '&_=' + Date.now());
    const csv = await res.text();
    parseSheet(csv);
    return true;
  } catch(e) {
    console.error(e);
    toast('❌ Failed to load sheet data');
    return false;
  }
}

function parseSheet(csv) {
  const lines = csv.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  allMatches   = [];
  groupMatches = {};
  koMatches    = {};

  for (let i = 1; i < lines.length; i++) {
    const c = splitLine(lines[i]);
    if (c.length < 7) continue;

    const phase  = (c[0]||'').trim().toUpperCase();
    const group  = (c[1]||'').trim();
    const md     = parseInt(c[2]) || 0;
    const team1  = (c[3]||'').trim();
    const raw1   = (c[4]||'').trim();
    const raw2   = (c[5]||'').trim();
    const team2  = (c[6]||'').trim();
    const status = (c[7]||'Upcoming').trim();

    if (!team1 || !team2) continue;

    const score1 = raw1 !== '' && !isNaN(raw1) ? parseInt(raw1) : null;
    const score2 = raw2 !== '' && !isNaN(raw2) ? parseInt(raw2) : null;

    const m = { phase, group, md, team1, team2, score1, score2, status };
    allMatches.push(m);

    if (phase === 'GROUP') {
      if (!groupMatches[group]) groupMatches[group] = {};
      if (!groupMatches[group][md]) groupMatches[group][md] = [];
      groupMatches[group][md].push(m);
    } else {
      if (!koMatches[group]) koMatches[group] = [];
      koMatches[group].push(m);
    }
  }

  computeStandings();
}

function splitLine(line) {
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i],nx=line[i+1];
    if(ch==='"'){if(q&&nx==='"'){c+='"';i++;}else q=!q;}
    else if(ch===','&&!q){r.push(c);c='';}
    else c+=ch;
  }
  r.push(c);
  return r.map(s=>s.trim().replace(/^"|"$/g,''));
}

// ── STANDINGS CALCULATION ─────────────────────────────────────────
function computeStandings() {
  standings = {};
  // Init all teams
  Object.entries(TEAMS).forEach(([name, t]) => {
    if (!standings[t.group]) standings[t.group] = {};
    standings[t.group][name] = {team:name, mp:0, w:0, d:0, l:0, gf:0, ga:0, pts:0};
  });

  allMatches.filter(m=>m.phase==='GROUP' && statusNorm(m.status)==='complete' && m.score1!==null && m.score2!==null)
    .forEach(m => {
      const grp = m.group;
      if (!standings[grp]) return;
      const a = standings[grp][m.team1];
      const b = standings[grp][m.team2];
      if (!a || !b) return;

      a.mp++; b.mp++;
      a.gf += m.score1; a.ga += m.score2;
      b.gf += m.score2; b.ga += m.score1;

      if (m.score1 > m.score2)      { a.w++; a.pts+=3; b.l++; }
      else if (m.score2 > m.score1) { b.w++; b.pts+=3; a.l++; }
      else                           { a.d++; a.pts+=1; b.d++; b.pts+=1; }
    });

  // Sort each group
  Object.keys(standings).forEach(grp => {
    standings[grp] = Object.values(standings[grp]).sort((a,b) =>
      b.pts - a.pts || (b.gf-b.ga) - (a.gf-a.ga) || b.gf - a.gf
    );
  });
}

function statusNorm(s){ return (s||'').toLowerCase().trim(); }

function winner(m){
  if (m.score1===null||m.score2===null) return null;
  if (m.score1>m.score2) return m.team1;
  if (m.score2>m.score1) return m.team2;
  return null;
}

function tf(name){ return (TEAMS[name]||{}).flag||'🏳'; }
function tp(name){ return (TEAMS[name]||{}).player||''; }

// ── RENDER: STANDINGS ─────────────────────────────────────────────
function renderStandings() {
  const container = document.getElementById('standingsContainer');
  const groups = ['A','B','C','D'];
  let html = '';

  groups.forEach(g => {
    const rows = standings[g] || [];
    const col  = GROUP_COLORS[g];
    html += `<div class="group-card">
      <div class="group-card-header">
        <span class="group-name" style="color:var(--${col})">GROUP ${g}</span>
        <span class="group-tag">${rows.length} teams</span>
      </div>
      <table class="standings-table">
        <thead><tr>
          <th>#&nbsp;&nbsp;Team</th>
          <th>MP</th><th>W</th><th>D</th><th>L</th>
          <th>GF</th><th>GA</th><th>GD</th><th>PTS</th>
        </tr></thead>
        <tbody>`;

    rows.forEach((r, i) => {
      const gd   = r.gf - r.ga;
      const gdTx = gd > 0 ? `<span class="gd-pos">+${gd}</span>` : gd < 0 ? `<span class="gd-neg">${gd}</span>` : `<span class="gd-neu">0</span>`;
      const rank = i < 2 ? 'q' : 'e'; // top 2 qualify
      const qualClass = i === 2 ? ' class="qual-line"' : '';
      const t = TEAMS[r.team]||{};

      html += `<tr${qualClass}>
        <td>
          <div class="team-cell">
            <span class="rank-badge ${rank}">${i+1}</span>
            <span class="team-flag">${t.flag||'🏳'}</span>
            <div><div class="team-name-sm">${r.team}</div><div class="team-player">${t.player||''}</div></div>
          </div>
        </td>
        <td>${r.mp}</td>
        <td style="color:var(--green)">${r.w}</td>
        <td style="color:var(--muted)">${r.d}</td>
        <td style="color:var(--red)">${r.l}</td>
        <td>${r.gf}</td>
        <td>${r.ga}</td>
        <td>${gdTx}</td>
        <td class="pts-cell">${r.pts}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  });

  container.innerHTML = html || '<div class="empty">No standing data yet</div>';
}

// ── RENDER: MATCHES ───────────────────────────────────────────────
function renderMatches() {
  // Gather all matchdays
  const mdSet = new Set();
  allMatches.filter(m=>m.phase==='GROUP').forEach(m=>mdSet.add(m.md));
  const mds = [...mdSet].sort((a,b)=>a-b);

  if (!mds.length) {
    document.getElementById('mdTabs').innerHTML = '';
    document.getElementById('mdContent').innerHTML = '<div class="empty">No group stage matches yet</div>';
    return;
  }

  // Find first matchday with any upcoming/live match, else last played
  let activeMd = mds[0];
  for (const md of mds) {
    const ms = allMatches.filter(m=>m.phase==='GROUP'&&m.md===md);
    if (ms.some(m=>['upcoming','live'].includes(statusNorm(m.status)))){
      activeMd = md; break;
    }
    activeMd = md; // last played
  }

  // Tabs
  let tabsHtml = '';
  mds.forEach(md => {
    const isActive = md === activeMd ? 'active' : '';
    tabsHtml += `<button class="md-tab ${isActive}" onclick="switchMD(${md},this)">MD ${md}</button>`;
  });
  document.getElementById('mdTabs').innerHTML = tabsHtml;

  // Content panes
  let contentHtml = '';
  mds.forEach(md => {
    const isActive = md === activeMd ? 'on' : '';
    contentHtml += `<div class="md-content ${isActive}" id="md-${md}">${buildMDContent(md)}</div>`;
  });
  document.getElementById('mdContent').innerHTML = contentHtml;
}

function switchMD(md, btn) {
  document.querySelectorAll('.md-content').forEach(el=>el.classList.remove('on'));
  document.getElementById('md-' + md).classList.add('on');
  document.querySelectorAll('.md-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

function buildMDContent(md) {
  const groups = ['A','B','C','D'];
  let html = '';
  groups.forEach(g => {
    const matches = (groupMatches[g]||{})[md]||[];
    if (!matches.length) return;
    const dc = GROUP_DOT[g];
    const gc = GROUP_COLORS[g];
    html += `<div class="matches-section">
      <div class="ms-label"><span class="dot ${dc}"></span>
        <span style="color:var(--${gc})">GROUP ${g}</span>
      </div>`;
    matches.forEach(m => { html += matchCardHTML(m); });
    html += `</div>`;
  });
  return html || '<div class="empty">No matches in this matchday</div>';
}

function matchCardHTML(m) {
  const sn    = statusNorm(m.status);
  const win   = winner(m);
  const t1win = win === m.team1;
  const t2win = win === m.team2;
  const hasScore = m.score1 !== null && m.score2 !== null;

  const t1c = hasScore ? (t1win ? 'winner' : t2win ? 'loser' : '') : '';
  const t2c = hasScore ? (t2win ? 'winner' : t1win ? 'loser' : '') : '';

  const scoreHTML = hasScore
    ? `<div class="mc-score ${t1win?'winner-left':t2win?'winner-right':''}">
         <span class="s">${m.score1}</span>
         <span class="sep">–</span>
         <span class="s">${m.score2}</span>
       </div>`
    : `<div class="mc-vs">VS</div>`;

  const statLabel = {upcoming:'Upcoming', live:'🔴 Live', complete:'FT', postponed:'Postponed'}[sn] || sn;

  return `<div class="mcard ${sn}">
    <div class="mc-team">
      <span class="mc-flag">${tf(m.team1)}</span>
      <div class="mc-name ${t1c}">${m.team1}</div>
      <div class="mc-player">${tp(m.team1)}</div>
    </div>
    <div class="mc-center">
      ${scoreHTML}
      <div class="mc-status ${sn}">${statLabel}</div>
    </div>
    <div class="mc-team right">
      <span class="mc-flag">${tf(m.team2)}</span>
      <div class="mc-name ${t2c}">${m.team2}</div>
      <div class="mc-player">${tp(m.team2)}</div>
    </div>
  </div>`;
}

// ── RENDER: KNOCKOUT ──────────────────────────────────────────────
function renderKnockout() {
  const container = document.getElementById('knockoutContainer');

  // Determine if any KO data exists
  const koRounds = KO_ORDER.filter(r => koMatches[r] && koMatches[r].length);

  if (!koRounds.length) {
    // Show "coming soon" bracket placeholder
    container.innerHTML = buildKOPlaceholder();
    return;
  }

  // Champion?
  const finalsRound = ['FINAL','FINALS','Final','Finals'].find(r=>koMatches[r]?.length);
  let champ = 'TBD';
  if (finalsRound) {
    const fm = koMatches[finalsRound].find(m=>statusNorm(m.status)==='complete');
    if (fm) champ = winner(fm) || 'TBD';
  }

  let html = '';

  if (champ !== 'TBD') {
    html += `<div class="champ-banner">
      <div class="champ-trophy">🏆</div>
      <div class="champ-lbl">Champion</div>
      <div class="champ-name">${tf(champ)} ${champ}</div>
    </div>`;
  }

  html += `<div class="ko-scroll"><div class="ko-bracket">`;
  koRounds.forEach((round, ri) => {
    const cls = KO_CLASS[round] || '';
    const lbl = KO_LABEL[round] || round;
    const matches = koMatches[round];

    html += `<div class="ko-round">
      <div class="ko-round-header ${cls}">${lbl}</div>
      <div class="ko-matches">`;

    matches.forEach(m => {
      const sn  = statusNorm(m.status);
      const win = winner(m);
      const t1c = win === m.team1 ? 'winner' : (win ? 'loser' : '');
      const t2c = win === m.team2 ? 'winner' : (win ? 'loser' : '');
      const s1  = m.score1 !== null ? m.score1 : '–';
      const s2  = m.score2 !== null ? m.score2 : '–';
      const isTBD1 = !m.team1 || m.team1.toLowerCase()==='tbd';
      const isTBD2 = !m.team2 || m.team2.toLowerCase()==='tbd';

      const statBar = sn==='live'
        ? `<div class="ko-status-bar live">🔴 Live</div>`
        : sn==='complete'
        ? `<div class="ko-status-bar complete">✓ Complete</div>`
        : sn==='postponed'
        ? `<div class="ko-status-bar postponed">⏸ Postponed</div>`
        : `<div class="ko-status-bar upcoming">Upcoming</div>`;

      html += `<div class="ko-match">
        ${statBar}
        <div class="ko-team ${t1c}">
          <span class="ko-flag">${isTBD1 ? '❓' : tf(m.team1)}</span>
          <span class="ko-tn ${isTBD1?'ko-tbd':''}">${m.team1||'TBD'}</span>
          <span class="ko-sc">${isTBD1?'':s1}</span>
        </div>
        <div class="ko-team ${t2c}">
          <span class="ko-flag">${isTBD2 ? '❓' : tf(m.team2)}</span>
          <span class="ko-tn ${isTBD2?'ko-tbd':''}">${m.team2||'TBD'}</span>
          <span class="ko-sc">${isTBD2?'':s2}</span>
        </div>
      </div>`;
    });

    html += `</div></div>`;
    if (ri < koRounds.length - 1) html += `<div class="ko-connector"></div>`;
  });

  html += `</div></div>`;
  container.innerHTML = html;
}

function buildKOPlaceholder() {
  const rounds = [
    {lbl:'Round of 16', cls:'r16', count:8},
    {lbl:'Quarter Finals', cls:'qf', count:4},
    {lbl:'Semi Finals', cls:'sf', count:2},
    {lbl:'Final', cls:'final', count:1},
  ];
  let html = `<div style="text-align:center;color:var(--muted);font-size:.8rem;margin-bottom:1rem;">
    🔒 Knockout stage begins after group stage</div>
    <div class="ko-scroll"><div class="ko-bracket">`;

  rounds.forEach((r, ri) => {
    html += `<div class="ko-round">
      <div class="ko-round-header ${r.cls}">${r.lbl}</div>
      <div class="ko-matches">`;
    for (let i=0; i<r.count; i++) {
      html += `<div class="ko-match">
        <div class="ko-status-bar upcoming">Upcoming</div>
        <div class="ko-team"><span class="ko-flag">❓</span><span class="ko-tn ko-tbd">TBD</span></div>
        <div class="ko-team"><span class="ko-flag">❓</span><span class="ko-tn ko-tbd">TBD</span></div>
      </div>`;
    }
    html += `</div></div>`;
    if (ri < rounds.length-1) html += `<div class="ko-connector"></div>`;
  });

  html += `</div></div>`;
  return html;
}

// ── HERO STATS ─────────────────────────────────────────────────────
function updateHero() {
  const played = allMatches.filter(m=>statusNorm(m.status)==='complete').length;
  const hasLive = allMatches.some(m=>statusNorm(m.status)==='live');
  document.getElementById('heroPlayed').textContent = played || '0';
  document.getElementById('heroStatus').textContent = hasLive ? 'LIVE' : 'ACTIVE';
}

// ── PAGE NAVIGATION ───────────────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById(name).classList.add('on');
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

// ── TOAST ──────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── MAIN LOAD ─────────────────────────────────────────────────────
async function loadAll() {
  await fetchData();
  updateHero();
  renderStandings();
  renderMatches();
  renderKnockout();
  toast('✓ Data refreshed');
}

window.addEventListener('load', () => {
  loadAll();
  setInterval(loadAll, 60000); // auto-refresh every minute
});
</script>
